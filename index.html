<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅行記帳工具 (雲端增強版)</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; max-width: 500px; margin: auto; background-color: #f4f6f8; color: #333; }
        .card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="number"], input[type="text"], select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        .preview { max-width: 100%; margin-top: 10px; display: none; border-radius: 8px; }
        .currency-display { font-size: 1.5em; font-weight: bold; color: #d9534f; }
        .rate-info { font-size: 0.8em; color: #777; margin-top: 5px; }
        .record-item { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .record-img { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; margin-right: 10px; flex-shrink: 0; }

        /* 圖片來源 tabs */
        .source-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
        .source-tab { flex: 1; padding: 10px; border: 2px solid #ccc; background: #f8f9fa; border-radius: 8px; font-size: 14px; font-weight: bold; color: #555; cursor: pointer; text-align: center; transition: all 0.2s; }
        .source-tab.active { border-color: #007bff; background: #e7f1ff; color: #007bff; }

        /* 總計卡片 */
        .summary-card { background: linear-gradient(135deg, #1a1a2e, #16213e); color: #fff; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .summary-card h3 { margin: 0 0 14px 0; font-size: 1em; opacity: 0.8; letter-spacing: 1px; }
        .summary-main { font-size: 2em; font-weight: bold; color: #ff6b6b; line-height: 1.2; }
        .summary-sub { font-size: 1em; color: #a8c6fa; margin-top: 4px; }
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
        .summary-item { background: rgba(255,255,255,0.08); border-radius: 8px; padding: 10px 12px; }
        .summary-item .slabel { font-size: 0.75em; opacity: 0.7; margin-bottom: 4px; }
        .summary-item .svalue { font-size: 1.05em; font-weight: bold; }

        /* 操作按鈕列 */
        .btn-row { display: flex; gap: 8px; margin-top: 14px; }
        .btn-sm { flex: 1; padding: 9px 4px; font-size: 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; color: white; }
        .btn-export-json { background: #6c757d; }
        .btn-export-json:hover { background: #545b62; }
        .btn-export-csv  { background: #28a745; }
        .btn-export-csv:hover  { background: #1e7e34; }
        .btn-import-json { background: #fd7e14; }
        .btn-import-json:hover { background: #e96b02; }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #b02a37; }

        /* 分類標籤 */
        .tag { display: inline-block; padding: 2px 7px; border-radius: 12px; font-size: 0.75em; font-weight: bold; margin-right: 4px; }
        .tag-飲食 { background: #fff3cd; color: #856404; }
        .tag-交通 { background: #d1ecf1; color: #0c5460; }
        .tag-購物 { background: #f8d7da; color: #721c24; }
        .tag-住宿 { background: #d4edda; color: #155724; }
        .tag-其他 { background: #e2e3e5; color: #383d41; }
    </style>
</head>
<body>

<h2 style="text-align: center;">📸 拍照記帳 (雲端增強版)</h2>

<!-- 記帳表單 -->
<div class="card">
    <div class="rate-info" id="rateInfo">正在獲取最新匯率...</div>

    <div class="input-group" style="margin-top:15px;">
        <label>1. 選擇圖片來源：</label>
        <div class="source-tabs">
            <div class="source-tab active" id="tabCamera" onclick="switchSource('camera')">📷 拍照</div>
            <div class="source-tab"        id="tabFile"   onclick="switchSource('file')">🖼️ 從檔案匯入</div>
        </div>
        <input type="file" id="cameraInput" accept="image/*" capture="environment">
        <input type="file" id="fileInput"   accept="image/*" style="display:none;">
    </div>

    <img id="imagePreview" class="preview" alt="收據預覽">
    <p  id="statusText" style="color:#007bff;font-weight:bold;font-size:0.9em;"></p>

    <div class="input-group">
        <label>分類:</label>
        <select id="categoryInput">
            <option value="飲食">🍜 飲食</option>
            <option value="交通">🚃 交通</option>
            <option value="購物">🛍️ 購物</option>
            <option value="住宿">🏨 住宿</option>
            <option value="其他">📌 其他</option>
        </select>
    </div>

    <div class="input-group">
        <label>日圓 (JPY):</label>
        <input type="number" id="jpyInput" placeholder="辨識結果會填入此，也可手動修改">
    </div>

    <div class="input-group">
        <label>約合台幣 (TWD):</label>
        <div id="twdDisplay" class="currency-display">NT$ 0</div>
    </div>

    <div class="input-group">
        <label>備註:</label>
        <input type="text" id="noteInput" placeholder="例如：黑亭拉麵、伴手禮...">
    </div>

    <button id="saveBtn">儲存紀錄</button>
</div>

<!-- 總計花費（有資料才顯示） -->
<div class="summary-card" id="summaryCard" style="display:none;">
    <h3>💴 總計花費</h3>
    <div class="summary-main" id="summaryJPY">¥ 0</div>
    <div class="summary-sub"  id="summaryTWD">約 NT$ 0</div>
    <div class="summary-grid" id="summaryGrid"></div>
    <div class="btn-row">
        <button class="btn-sm btn-export-json" onclick="exportJSON()">📦 備份JSON</button>
        <button class="btn-sm btn-export-csv"  onclick="exportCSV()">📊 匯出CSV</button>
        <button class="btn-sm btn-import-json" onclick="document.getElementById('importInput').click()">📥 匯入JSON</button>
        <button class="btn-sm btn-danger"       onclick="clearAll()">🗑️ 清除</button>
    </div>
    <input type="file" id="importInput" accept=".json" style="display:none;">
</div>

<!-- 歷史紀錄 -->
<div class="card" id="historyCard" style="display:none;">
    <h3>📝 歷史紀錄</h3>
    <div id="recordList"></div>
</div>

<canvas id="compressCanvas" style="display:none;"></canvas>

<script>
const API_KEY = 'K88343483088957';

const rateInfo       = document.getElementById('rateInfo');
const cameraInput    = document.getElementById('cameraInput');
const fileInput      = document.getElementById('fileInput');
const imagePreview   = document.getElementById('imagePreview');
const statusText     = document.getElementById('statusText');
const categoryInput  = document.getElementById('categoryInput');
const jpyInput       = document.getElementById('jpyInput');
const twdDisplay     = document.getElementById('twdDisplay');
const noteInput      = document.getElementById('noteInput');
const saveBtn        = document.getElementById('saveBtn');
const recordList     = document.getElementById('recordList');
const historyCard    = document.getElementById('historyCard');
const summaryCard    = document.getElementById('summaryCard');
const importInput    = document.getElementById('importInput');
const compressCanvas = document.getElementById('compressCanvas');
const ctx = compressCanvas.getContext('2d');

let currentRate = 0.21;
let currentImageBase64 = '';

// ── 來源切換 ──────────────────────────────────────────────
function switchSource(mode) {
    const isCamera = mode === 'camera';
    document.getElementById('tabCamera').classList.toggle('active', isCamera);
    document.getElementById('tabFile').classList.toggle('active', !isCamera);
    cameraInput.style.display = isCamera ? '' : 'none';
    fileInput.style.display   = isCamera ? 'none' : '';
    imagePreview.style.display = 'none';
    statusText.innerText = '';
    currentImageBase64 = '';
}

// ── 匯率 ──────────────────────────────────────────────────
async function initExchangeRate() {
    try {
        const res = await fetch('https://open.er-api.com/v6/latest/JPY');
        const data = await res.json();
        currentRate = data.rates.TWD;
        localStorage.setItem('saved_jpy_twd_rate', currentRate);
        localStorage.setItem('saved_rate_time', new Date().toLocaleString());
        rateInfo.innerText = `目前匯率: 1 JPY = ${currentRate.toFixed(4)} TWD（線上更新）`;
    } catch {
        const savedRate = localStorage.getItem('saved_jpy_twd_rate');
        const savedTime = localStorage.getItem('saved_rate_time');
        if (savedRate) {
            currentRate = parseFloat(savedRate);
            rateInfo.innerText = `目前匯率: 1 JPY = ${currentRate.toFixed(4)} TWD（離線快取於 ${savedTime}）`;
        } else {
            rateInfo.innerText = `無法連線，使用預設匯率: 1 JPY = ${currentRate} TWD`;
        }
    }
}

jpyInput.addEventListener('input', () => {
    const jpy = parseFloat(jpyInput.value) || 0;
    twdDisplay.innerText = `NT$ ${Math.round(jpy * currentRate).toLocaleString()}`;
});

// ── OCR 金額擷取（多策略） ────────────────────────────────
function extractAmountFromOCR(text) {
    const normalized = text
        .replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0))
        .replace(/￥/g, '¥')
        .replace(/\r\n/g, '\n').replace(/\r/g, '\n');

    const lines = normalized.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    const PRIORITY = ['合計', '合 計', 'お買上額', '請求額', 'お会計'];
    const FALLBACK  = ['小計'];

    for (const kw of [...PRIORITY, ...FALLBACK]) {
        for (let i = 0; i < lines.length; i++) {
            if (!lines[i].includes(kw)) continue;
            const inlineNums = lines[i].match(/\d[\d,]*/g);
            if (inlineNums) {
                const max = Math.max(...inlineNums.map(n => parseInt(n.replace(/,/g, ''), 10)));
                if (max >= 10) return max;
            }
            for (let j = i + 1; j <= i + 3 && j < lines.length; j++) {
                const nextNums = lines[j].match(/[¥]?\s*(\d[\d,]*)/g);
                if (nextNums) {
                    const max = Math.max(...nextNums.map(n => parseInt(n.replace(/[¥\s,]/g, ''), 10)));
                    if (max >= 10) return max;
                }
            }
        }
    }

    const noChange = normalized.replace(/お釣り[^\n]*/g, '').replace(/釣銭[^\n]*/g, '');
    const yenMatches = noChange.match(/[¥]\s*(\d[\d,]+)/g);
    if (yenMatches) {
        const max = Math.max(...yenMatches.map(s => parseInt(s.replace(/[¥\s,]/g, ''), 10)));
        if (max >= 10) return max;
    }

    const allNums = normalized.match(/\d[\d,]*/g);
    if (allNums) return Math.max(...allNums.map(n => parseInt(n.replace(/,/g, ''), 10)));
    return 0;
}

// ── 圖片壓縮 + OCR ────────────────────────────────────────
function processImageFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(event) {
        const img = new Image();
        img.onload = function() {
            const MAX_WIDTH = 600;
            const scale = MAX_WIDTH / img.width;
            compressCanvas.width  = MAX_WIDTH;
            compressCanvas.height = img.height * scale;
            ctx.drawImage(img, 0, 0, compressCanvas.width, compressCanvas.height);

            currentImageBase64 = compressCanvas.toDataURL('image/jpeg', 0.8);
            imagePreview.src = currentImageBase64;
            imagePreview.style.display = 'block';

            statusText.style.color = '#007bff';
            statusText.innerText = '☁️ 正在上傳雲端辨識中，請稍候...';

            const formData = new FormData();
            formData.append('base64Image', currentImageBase64);
            formData.append('language', 'jpn');
            formData.append('scale', 'true');
            formData.append('isTable', 'true');
            formData.append('OCREngine', '2');

            fetch('https://api.ocr.space/parse/image', {
                method: 'POST',
                headers: { 'apikey': API_KEY },
                body: formData
            })
            .then(r => r.json())
            .then(data => {
                if (data.IsErroredOnProcessing) throw new Error(data.ErrorMessage[0]);
                const text = data.ParsedResults[0].ParsedText;
                console.log('OCR 結果：\n', text);
                const amount = extractAmountFromOCR(text);
                if (amount > 0) {
                    jpyInput.value = amount;
                    jpyInput.dispatchEvent(new Event('input'));
                    statusText.style.color = 'green';
                    statusText.innerText = `✅ 辨識完成！抓取到合計金額：¥${amount}`;
                } else {
                    statusText.style.color = 'orange';
                    statusText.innerText = '⚠️ 找不到明確合計數字，請手動輸入。';
                }
            })
            .catch(err => {
                console.error(err);
                statusText.style.color = 'red';
                statusText.innerText = '❌ 辨識失敗或無網路連線，請手動輸入。';
            });
        };
        img.src = event.target.result;
    };
    reader.readAsDataURL(file);
}

cameraInput.addEventListener('change', e => processImageFile(e.target.files[0]));
fileInput.addEventListener('change',   e => processImageFile(e.target.files[0]));

// ── 儲存紀錄 ──────────────────────────────────────────────
saveBtn.addEventListener('click', () => {
    const jpy = parseFloat(jpyInput.value);
    if (!jpy) { alert('請輸入日圓金額！'); return; }

    const record = {
        id: Date.now(),
        date: new Date().toLocaleDateString(),
        category: categoryInput.value,
        amountJPY: jpy,
        amountTWD: Math.round(jpy * currentRate),
        note: noteInput.value || '無備註',
        image: currentImageBase64
    };

    const records = JSON.parse(localStorage.getItem('travel_records')) || [];
    records.unshift(record);
    localStorage.setItem('travel_records', JSON.stringify(records));

    jpyInput.value = '';
    twdDisplay.innerText = 'NT$ 0';
    noteInput.value = '';
    imagePreview.style.display = 'none';
    currentImageBase64 = '';
    cameraInput.value = '';
    fileInput.value = '';
    statusText.style.color = 'green';
    statusText.innerText = '✅ 儲存成功！';

    renderAll();
});

// ── 總計渲染 ──────────────────────────────────────────────
function renderSummary(records) {
    if (records.length === 0) { summaryCard.style.display = 'none'; return; }
    summaryCard.style.display = 'block';

    const totalJPY = records.reduce((s, r) => s + r.amountJPY, 0);
    const totalTWD = records.reduce((s, r) => s + r.amountTWD, 0);

    document.getElementById('summaryJPY').innerText = `¥ ${totalJPY.toLocaleString()}`;
    document.getElementById('summaryTWD').innerText = `約 NT$ ${totalTWD.toLocaleString()}`;

    const catEmoji = { 飲食:'🍜', 交通:'🚃', 購物:'🛍️', 住宿:'🏨', 其他:'📌' };
    const catMap = {};
    records.forEach(r => { catMap[r.category] = (catMap[r.category] || 0) + r.amountJPY; });

    const grid = document.getElementById('summaryGrid');
    grid.innerHTML = '';
    Object.entries(catMap)
        .sort((a, b) => b[1] - a[1])
        .forEach(([cat, jpy]) => {
            const pct = Math.round(jpy / totalJPY * 100);
            grid.innerHTML += `
                <div class="summary-item">
                    <div class="slabel">${catEmoji[cat] || ''} ${cat}</div>
                    <div class="svalue">¥${jpy.toLocaleString()} <span style="opacity:0.6;font-size:0.8em">${pct}%</span></div>
                </div>`;
        });
}

// ── 歷史紀錄渲染 ──────────────────────────────────────────
function renderRecords(records) {
    if (records.length === 0) { historyCard.style.display = 'none'; return; }
    historyCard.style.display = 'block';
    recordList.innerHTML = '';

    const catClass = { 飲食:'tag-飲食', 交通:'tag-交通', 購物:'tag-購物', 住宿:'tag-住宿', 其他:'tag-其他' };
    records.forEach(record => {
        const item = document.createElement('div');
        item.className = 'record-item';
        const imgHtml = record.image
            ? `<img src="${record.image}" class="record-img">`
            : `<div class="record-img" style="background:#eee;display:flex;align-items:center;justify-content:center;color:#aaa;font-size:1.4em;">📷</div>`;
        item.innerHTML = `
            <div style="display:flex;align-items:center;">
                ${imgHtml}
                <div>
                    <span class="tag ${catClass[record.category] || ''}">${record.category}</span>
                    <strong>${record.note}</strong><br>
                    <span style="font-size:0.8em;color:#888;">${record.date}</span>
                </div>
            </div>
            <div style="text-align:right;flex-shrink:0;margin-left:8px;">
                <div style="font-weight:bold;">¥ ${record.amountJPY.toLocaleString()}</div>
                <div style="font-size:0.8em;color:#d9534f;">NT$ ${record.amountTWD.toLocaleString()}</div>
            </div>`;
        recordList.appendChild(item);
    });
}

function renderAll() {
    const records = JSON.parse(localStorage.getItem('travel_records')) || [];
    renderSummary(records);
    renderRecords(records);
}

// ── 匯出 JSON 備份 ────────────────────────────────────────
function exportJSON() {
    const records = JSON.parse(localStorage.getItem('travel_records')) || [];
    if (!records.length) { alert('目前沒有紀錄可備份。'); return; }
    const blob = new Blob([JSON.stringify(records, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `travel_records_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
}

// ── 匯出 CSV（Excel 可開啟） ──────────────────────────────
function exportCSV() {
    const records = JSON.parse(localStorage.getItem('travel_records')) || [];
    if (!records.length) { alert('目前沒有紀錄可匯出。'); return; }
    const header = ['日期', '分類', '備註', '日圓(JPY)', '台幣(TWD)'];
    const rows   = records.map(r => [r.date, r.category, r.note, r.amountJPY, r.amountTWD]);
    const csv    = '\uFEFF' + [header, ...rows].map(r => r.map(v => `"${v}"`).join(',')).join('\n');
    const blob   = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `travel_records_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
}

// ── 匯入 JSON ─────────────────────────────────────────────
importInput.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
        try {
            const imported = JSON.parse(ev.target.result);
            if (!Array.isArray(imported)) throw new Error('格式錯誤');
            const existing = JSON.parse(localStorage.getItem('travel_records')) || [];
            const existingIds = new Set(existing.map(r => r.id));
            const newItems = imported.filter(r => !existingIds.has(r.id));
            const merged = [...newItems, ...existing].sort((a, b) => b.id - a.id);
            localStorage.setItem('travel_records', JSON.stringify(merged));
            alert(`✅ 匯入成功！新增 ${newItems.length} 筆，略過重複 ${imported.length - newItems.length} 筆。`);
            renderAll();
        } catch {
            alert('❌ 匯入失敗，請確認為本 App 匯出的 JSON 檔案。');
        }
        importInput.value = '';
    };
    reader.readAsText(file);
});

// ── 清除全部 ──────────────────────────────────────────────
function clearAll() {
    if (!confirm('確定要清除所有紀錄嗎？此動作無法復原。')) return;
    localStorage.removeItem('travel_records');
    renderAll();
}

initExchangeRate();
renderAll();
</script>
</body>
</html>
