<script>
const API_KEY = 'K88343483088957';

// DOM

let currentImageBase64 = '';
let deferredPrompt = null; // Android 安裝 prompt

// ── Service Worker 註冊 ───────────────────────────────────
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')

// ── 離線偵測 ─────────────────────────────────────────────
const offlineBar = document.getElementById('offlineBar');

// ── Android PWA 安裝提示 ──────────────────────────────────
window.addEventListener('beforeinstallprompt', e => {

    deferredPrompt = e;

// 點「安裝 App」按鈕 → 觸發原生安裝對話框
async function triggerInstall() {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    console.log('PWA install outcome:', outcome);
    deferredPrompt = null;
    dismissBanner();
}

// 安裝成功後隱藏橫幅
window.addEventListener('appinstalled', () => dismissBanner());

// ── iOS PWA 安裝提示 ──────────────────────────────────────
function isIOS() {
    return /iphone|ipad|ipod/i.test(navigator.userAgent);
}
function isInStandaloneMode() {
    return window.matchMedia('(display-mode: standalone)').matches
        || window.navigator.standalone === true;
}
function dismissBanner() {
    document.getElementById('installBanner').style.display = 'none';
    localStorage.setItem('install_banner_dismissed', '1');
}
if (isIOS() && !isInStandaloneMode() && !localStorage.getItem('install_banner_dismissed')) {
    document.getElementById('installBannerText').textContent = '📲 點「分享」→「加入主畫面」即可安裝 App';
    document.getElementById('installBanner').style.display = 'flex';

// ── 匯率 ──────────────────────────────────────────────────
async function initExchangeRate() {
    try {
        const res  = await fetch('https://open.er-api.com/v6/latest/JPY');
        const data = await res.json();
        currentRate = data.rates.TWD;
        localStorage.setItem('saved_jpy_twd_rate', currentRate);
        localStorage.setItem('saved_rate_time', new Date().toLocaleString());
        rateInfo.innerText = `目前匯率: 1 JPY ≈ ${currentRate.toFixed(4)} TWD（線上更新）`;
    } catch {
        const savedRate = localStorage.getItem('saved_jpy_twd_rate');
        const savedTime = localStorage.getItem('saved_rate_time');
        if (savedRate) {
            currentRate = parseFloat(savedRate);
            rateInfo.innerText = `1 JPY ≈ ${currentRate.toFixed(4)} TWD（快取於 ${savedTime}）`;
        } else {
            rateInfo.innerText = `無法連線，使用預設匯率 1 JPY ≈ ${currentRate} TWD`;
        }
    }
}

jpyInput.addEventListener('input', () => {

    twdDisplay.innerText = `NT$ ${Math.round(jpy * currentRate).toLocaleString()}`;

// ── OCR 金額擷取（加強版：排除 IC 卡餘額）────────────────
function extractAmountFromOCR(text) {
    // ── Step 0：正規化 ──────────────────────────────────────
    const normalized = text
        .replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0))
        .replace(/[¥￥]/g, '¥')
        .replace(/\r\n/g, '\n').replace(/\r/g, '\n');

    // ── Step 1：標記需要「整行忽略」的關鍵字 ────────────────
    // 這些行的數字絕對不是消費金額
    const IGNORE_LINE_KEYWORDS = [
        // IC 卡餘額
        '残額', '残高', 'ざんだか', 'SF残額', 'SF残高',
        'チャージ残額', 'チャージ残高', '入金残額', '電子マネー残高',
        'ポイント残高', '残ポイント',
        // 找零
        'お釣り', 'お釣', 'おつり', '釣銭', 'つり銭',
        // 支付前現金 / 預收
        'お預り', 'おあずかり', '預り', 'お預かり',
        // IC 卡支付金額（這是扣款，不是總計）
        'IC支払', 'IC利用', '電子マネー支払', 'Suica支払',
        'PASMO支払', 'ICOCA支払', 'nanaco支払', 'Edy支払',
        'iD支払', 'QUICPay支払',
        // 消費稅單獨列（內稅，不是總計）
        '内消費税', '内税', '（内税）', '(内税)',
    ];

    // ── Step 2：找出「應該忽略的行」的 index 集合 ────────────
    const lines = normalized.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    const ignoredLineIdx = new Set();
    lines.forEach((line, i) => {
        if (IGNORE_LINE_KEYWORDS.some(kw => line.includes(kw))) {
            ignoredLineIdx.add(i);
            // 同時忽略緊接的下一行（有時餘額數字在關鍵字的下一行）
            ignoredLineIdx.add(i + 1);
        }
    });

    // 輔助：從一行文字中取出最大數字（忽略行則回傳 -1）
    function getMaxNum(line) {
        const nums = line.match(/\d[\d,]*/g);
        if (!nums) return -1;
        return Math.max(...nums.map(n => parseInt(n.replace(/,/g, ''), 10)));
    }

    // ── Step 3：優先關鍵字搜尋（合計 / 請求額 等）───────────
    // 優先順序：合計 > お買上額 > 請求額 > お会計 > 小計
    const PRIORITY_KW = ['合計', '合 計', 'お買上額', '請求額', 'お会計'];
    const FALLBACK_KW = ['小計'];

    for (const kw of [...PRIORITY_KW, ...FALLBACK_KW]) {
        for (let i = 0; i < lines.length; i++) {
            if (ignoredLineIdx.has(i)) continue;         // 忽略餘額等行
            if (!lines[i].includes(kw)) continue;

            // 同一行找數字
            const inlineMax = getMaxNum(lines[i]);
            if (inlineMax >= 10) return inlineMax;

            // 跨行：往後最多 3 行（同樣跳過忽略行）
            for (let j = i + 1; j <= i + 3 && j < lines.length; j++) {
                if (ignoredLineIdx.has(j)) continue;
                const nextNums = lines[j].match(/[¥]?\s*(\d[\d,]*)/g);
                if (nextNums) {
                    const max = Math.max(...nextNums.map(n =>
                        parseInt(n.replace(/[¥\s,]/g, ''), 10)
                    ));
                    if (max >= 10) return max;
                }
            }
        }
    }

    // ── Step 4：全文搜尋 ¥數字，排除忽略行後取最大值 ────────
    let yenMax = 0;
    lines.forEach((line, i) => {
        if (ignoredLineIdx.has(i)) return;
        const yenNums = line.match(/[¥]\s*(\d[\d,]+)/g);
        if (yenNums) {
            const max = Math.max(...yenNums.map(s =>
                parseInt(s.replace(/[¥\s,]/g, ''), 10)
            ));
            if (max > yenMax) yenMax = max;
        }
    });
    if (yenMax >= 10) return yenMax;

    // ── Step 5：最後手段 — 所有數字取最大（排除忽略行）──────
    let allMax = 0;
    lines.forEach((line, i) => {
        if (ignoredLineIdx.has(i)) return;
        const max = getMaxNum(line);
        if (max > allMax) allMax = max;
    });
    return allMax >= 10 ? allMax : 0;
}

// ── OCR 商店名稱擷取 ──────────────────────────────────────
function extractStoreFromOCR(text) {
    const normalized = text
        .replace(/\r\n/g, '\n').replace(/\r/g, '\n')
        .replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));

    const lines = normalized.split('\n')
        .map(l => l.trim())
        .filter(l => l.length > 0);

    // ── 策略 1：找「店名」「店舗名」「屋号」等明確標籤 ──────
    const storeLabelKw = ['店名', '店舗名', '屋号', 'ストア名', 'お店'];
    for (const line of lines) {
        for (const kw of storeLabelKw) {
            if (line.includes(kw)) {
                // 同行冒號後取店名
                const m = line.match(/[：:]\s*(.+)/);
                if (m && m[1].trim().length >= 2) return m[1].trim();
            }
        }
    }

    // ── 策略 2：收據通常前 5 行就是店名，找最長的純文字行 ───
    // 排除規則：全是數字/符號、包含電話FAX地址、太短
    const NOISE_KW = [
        'TEL', 'FAX', 'Tel', 'Fax', '電話', '〒', 'http', 'www',
        '登録番号', '登録No', '適格', 'インボイス',
        '営業', '定休', '受付', 'thank', 'Thank', 'ありがとう',
        'レシート', '領収', '明細', 'No.', 'NO.',
    ];

    const topLines = lines.slice(0, 8);
    let bestStore = '';

    for (const line of topLines) {
        // 跳過含雜訊關鍵字的行
        if (NOISE_KW.some(kw => line.includes(kw))) continue;
        // 跳過主要是數字或符號的行
        if (/^[\d\s\-\(\)\/\\.,＊※◆●▶【】「」]+$/.test(line)) continue;
        // 跳過太短的行
        if (line.length < 2) continue;
        // 跳過包含電話格式的行
        if (/\d{2,4}[-－]\d{2,4}[-－]\d{3,4}/.test(line)) continue;

        // 取字元最多的那行（通常店名最顯眼）
        if (line.length > bestStore.length) bestStore = line;
    }

    // 清理：去除前後的特殊符號
    bestStore = bestStore.replace(/^[★☆◆●▶【】「」※◎○\s]+/, '')
                         .replace(/[★☆◆●▶【】「」※◎○\s]+$/, '')
                         .trim();

    return bestStore.length >= 2 ? bestStore : '';
}

// ── OCR 消費日期擷取 ──────────────────────────────────────
function extractDateFromOCR(text) {
    const normalized = text
        .replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0))
        .replace(/\r\n/g, '\n').replace(/\r/g, '\n');

    const patterns = [
        // 2024年03月14日 / 2024年3月14日
        { re: /(\d{4})[年](\d{1,2})[月](\d{1,2})[日]?/, y:1, m:2, d:3 },
        // 2024/03/14 or 2024-03-14
        { re: /(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/, y:1, m:2, d:3 },
        // 令和xx年mm月dd日
        { re: /令和(\d{1,2})[年\/](\d{1,2})[月\/](\d{1,2})[日]?/, reiwa:true, y:1, m:2, d:3 },
        // 平成xx年mm月dd日
        { re: /平成(\d{1,2})[年\/](\d{1,2})[月\/](\d{1,2})[日]?/, heisei:true, y:1, m:2, d:3 },
        // 24/03/14（2位年）
        { re: /(\d{2})[\/](\d{1,2})[\/](\d{1,2})/, shortY:true, y:1, m:2, d:3 },
    ];

    for (const p of patterns) {
        const match = normalized.match(p.re);
        if (!match) continue;
        let year  = parseInt(match[p.y], 10);
        const mon = parseInt(match[p.m], 10);
        const day = parseInt(match[p.d], 10);

        if (p.reiwa)  year = 2018 + year;
        if (p.heisei) year = 1988 + year;
        if (p.shortY) year = year + (year >= 50 ? 1900 : 2000);

        if (year < 2000 || year > 2100) continue;
        if (mon < 1 || mon > 12) continue;
        if (day < 1 || day > 31) continue;

        return `${year}-${String(mon).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    }
    return '';
}

function processImageFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(event) {
        const img = new Image();
        img.onload = function() {
            const MAX_WIDTH = 600;
            const scale = MAX_WIDTH / img.width;
            compressCanvas.width  = MAX_WIDTH;
            compressCanvas.height = img.height * scale;
            ctx.drawImage(img, 0, 0, compressCanvas.width, compressCanvas.height);

            currentImageBase64 = compressCanvas.toDataURL('image/jpeg', 0.8);
            imagePreview.src   = currentImageBase64;
            imagePreview.style.display = 'block';

            statusText.style.color = '#007bff';
            statusText.innerText = '☁️ 正在上傳雲端辨識中，請稍候...';

            if (!navigator.onLine) {
                statusText.style.color = 'orange';
                statusText.innerText = '📵 目前離線，請手動輸入金額。';
                return;
            }

            const formData = new FormData();
            formData.append('base64Image', currentImageBase64);
            formData.append('language', 'jpn');
            formData.append('scale', 'true');
            formData.append('isTable', 'true');
            formData.append('OCREngine', '2');

            fetch('https://api.ocr.space/parse/image', {
                method: 'POST',
                headers: { 'apikey': API_KEY },
                body: formData
            })
            .then(r => r.json())
            .then(data => {
                if (data.IsErroredOnProcessing) throw new Error(data.ErrorMessage[0]);
                const text = data.ParsedResults[0].ParsedText;
                console.log('OCR 結果：\n', text);

                // 金額辨識
                const amount = extractAmountFromOCR(text);
                // 商店辨識
                const store  = extractStoreFromOCR(text);
                // 日期辨識
                const receiptDate = extractDateFromOCR(text);

                if (store && !storeInput.value) storeInput.value = store;
                if (receiptDate && !receiptDateInput.value) receiptDateInput.value = receiptDate;

                if (amount > 0) {
                    jpyInput.value = amount;
                    jpyInput.dispatchEvent(new Event('input'));
                    statusText.style.color = 'green';
                    const parts = [`✅ 合計：¥${amount.toLocaleString()}`];
                    if (store) parts.push(`商店：${store}`);
                    if (receiptDate) parts.push(`日期：${receiptDate}`);
                    statusText.innerText = parts.join('　');
                } else {
                    statusText.style.color = 'orange';
                    statusText.innerText = store
                        ? `⚠️ 找不到合計數字，請手動輸入。（商店：${store}）`
                        : '⚠️ 找不到明確合計數字，請手動輸入。';
                }
            })
            .catch(err => {
                console.error(err);
                statusText.style.color = 'red';
                statusText.innerText = '❌ 辨識失敗，請手動輸入。';
            });
        };
        img.src = event.target.result;
    };
    reader.readAsDataURL(file);
}

cameraInput.addEventListener('change', e => processImageFile(e.target.files[0]));

// ── 儲存紀錄 ──────────────────────────────────────────────
saveBtn.addEventListener('click', () => {
    const jpy = parseFloat(jpyInput.value);
    if (!jpy) { alert('請輸入日圓金額！'); return; }

    const record = {
        id: Date.now(),
        date: new Date().toLocaleDateString('zh-TW'),
        receiptDate: receiptDateInput.value || '',
        category: categoryInput.value,
        store: storeInput.value.trim() || '',
        amountJPY: jpy,
        amountTWD: Math.round(jpy * currentRate),
        note: noteInput.value.trim() || '無備註',
        image: currentImageBase64
    };

    const records = JSON.parse(localStorage.getItem('travel_records')) || [];
    records.unshift(record);
    localStorage.setItem('travel_records', JSON.stringify(records));

    // 清空表單
    jpyInput.value = '';
    twdDisplay.innerText = 'NT$ 0';
    storeInput.value = '';
    receiptDateInput.value = '';
    noteInput.value = '';
    imagePreview.style.display = 'none';
    currentImageBase64 = '';
    cameraInput.value = '';
    statusText.style.color = 'green';
    statusText.innerText = '✅ 儲存成功！';

    renderAll();

    // 滾動到總計卡片
    setTimeout(() => summaryCard.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
});

// ── 總計渲染 ──────────────────────────────────────────────
function renderSummary(records) {
    if (records.length === 0) { summaryCard.style.display = 'none'; return; }
    summaryCard.style.display = 'block';

    const totalJPY = records.reduce((s, r) => s + r.amountJPY, 0);
    const totalTWD = records.reduce((s, r) => s + r.amountTWD, 0);
    const count    = records.length;

    document.getElementById('summaryJPY').innerText = `¥ ${totalJPY.toLocaleString()}`;
    document.getElementById('summaryTWD').innerText = `約 NT$ ${totalTWD.toLocaleString()}　共 ${count} 筆`;

    const catEmoji = { 飲食:'🍜', 交通:'🚃', 購物:'🛍️', 住宿:'🏨', 其他:'📌' };
    const catMap   = {};
    records.forEach(r => { catMap[r.category] = (catMap[r.category] || 0) + r.amountJPY; });

    const grid = document.getElementById('summaryGrid');
    grid.innerHTML = '';
    Object.entries(catMap)
        .sort((a, b) => b[1] - a[1])
        .forEach(([cat, jpy]) => {
            const pct = Math.round(jpy / totalJPY * 100);
            grid.innerHTML += `
                <div class="summary-item">
                    <div class="slabel">${catEmoji[cat] || ''} ${cat}</div>
                    <div class="svalue">¥${jpy.toLocaleString()} <span style="opacity:0.6;font-size:0.8em">${pct}%</span></div>
                </div>`;
        });
}

// ── 歷史紀錄渲染 ──────────────────────────────────────────
function renderRecords(records) {
    if (records.length === 0) { historyCard.style.display = 'none'; return; }
    historyCard.style.display = 'block';
    recordList.innerHTML = '';

    const catClass = { 飲食:'tag-飲食', 交通:'tag-交通', 購物:'tag-購物', 住宿:'tag-住宿', 其他:'tag-其他' };
    records.forEach(record => {
        const item = document.createElement('div');
        item.className = 'record-item';
        const imgHtml = record.image
            ? `<img src="${record.image}" class="record-img">`
            : `<div class="record-img" style="background:#eee;display:flex;align-items:center;justify-content:center;font-size:1.4em;">📷</div>`;
        item.innerHTML = `
            <div style="display:flex;align-items:center;min-width:0;">
                ${imgHtml}
                <div style="min-width:0;">
                    <span class="tag ${catClass[record.category] || ''}">${record.category}</span>
                    ${record.store ? `<span style="font-size:0.85em;color:#555;font-weight:bold;">🏪 ${record.store}</span><br>` : ''}
                    ${record.receiptDate ? `<span style="font-size:0.78em;color:#007bff;">📅 ${record.receiptDate}</span><br>` : ''}
                    <strong style="word-break:break-all;">${record.note}</strong><br>
                    <span style="font-size:0.8em;color:#888;">記帳：${record.date}</span>
                </div>
            </div>
            <div style="text-align:right;flex-shrink:0;margin-left:8px;">
                <div style="font-weight:bold;">¥ ${record.amountJPY.toLocaleString()}</div>
                <div style="font-size:0.8em;color:#d9534f;">NT$ ${record.amountTWD.toLocaleString()}</div>
            </div>`;
        recordList.appendChild(item);
    });
}

function renderAll() {
    const records = JSON.parse(localStorage.getItem('travel_records')) || [];
    renderSummary(records);
    renderRecords(records);
}

// ── 匯出 JSON ─────────────────────────────────────────────
function exportJSON() {
    const records = JSON.parse(localStorage.getItem('travel_records')) || [];
    if (!records.length) { alert('目前沒有紀錄可備份。'); return; }
    const blob = new Blob([JSON.stringify(records, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `travel_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
}

// ── 匯出 CSV ──────────────────────────────────────────────
function exportCSV() {
    const records = JSON.parse(localStorage.getItem('travel_records')) || [];
    if (!records.length) { alert('目前沒有紀錄可匯出。'); return; }
    const header = ['消費日期', '記帳日期', '分類', '商店', '備註', '日圓(JPY)', '台幣(TWD)'];
    const rows   = records.map(r => [r.receiptDate || '', r.date, r.category, r.store || '', r.note, r.amountJPY, r.amountTWD]);
    const csv    = '\uFEFF' + [header, ...rows].map(r => r.map(v => `"${v}"`).join(',')).join('\n');
    const blob   = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `travel_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
}

// ── 匯出 Excel（依消費日期分組，含小計與總計）────────────
function exportExcel() {
    if (typeof XLSX === 'undefined') { alert('Excel 函式庫載入中，請稍後再試。'); return; }
    const records = JSON.parse(localStorage.getItem('travel_records')) || [];
    if (!records.length) { alert('目前沒有紀錄可匯出。'); return; }

    const wb = XLSX.utils.book_new();

    // ── 排序：消費日期升冪，無日期放最後 ─────────────────
    const sorted = [...records].sort((a, b) => {
        const da = a.receiptDate || '9999';
        const db = b.receiptDate || '9999';
        return da.localeCompare(db);
    });

    // ── 依消費日期分組 ────────────────────────────────────
    const groups = {};
    sorted.forEach(r => {
        const key = r.receiptDate || '（未填日期）';
        if (!groups[key]) groups[key] = [];
        groups[key].push(r);
    });

    // ══════════════════════════════════════════════════════
    // 工作表 1：消費明細
    // ══════════════════════════════════════════════════════
    const wsData = [];

    // 表頭
    wsData.push(['消費日期', '分類', '商店', '備註', '日圓 (JPY)', '台幣 (TWD)']);

    let totalJPY = 0, totalTWD = 0;
    const subtotalRows = []; // 記錄小計列的 row index（0-based）
    let rowIdx = 1;

    Object.entries(groups).forEach(([date, items]) => {
        let dayJPY = 0, dayTWD = 0;
        items.forEach(r => {
            wsData.push([date, r.category, r.store || '', r.note, r.amountJPY, r.amountTWD]);
            dayJPY += r.amountJPY;
            dayTWD += r.amountTWD;
            rowIdx++;
        });
        // 日期小計列
        wsData.push([`${date} 小計`, '', '', '', dayJPY, dayTWD]);
        subtotalRows.push(rowIdx);
        rowIdx++;
        totalJPY += dayJPY;
        totalTWD += dayTWD;
    });

    // 空白分隔
    wsData.push(['', '', '', '', '', '']);
    rowIdx++;

    // 總計列
    const totalRowIdx = rowIdx;
    wsData.push(['✦ 旅行總計', '', '', '', totalJPY, totalTWD]);

    const ws1 = XLSX.utils.aoa_to_sheet(wsData);

    // 欄寬
    ws1['!cols'] = [
        { wch: 18 }, // 消費日期
        { wch: 8  }, // 分類
        { wch: 22 }, // 商店
        { wch: 24 }, // 備註
        { wch: 14 }, // JPY
        { wch: 14 }, // TWD
    ];

    // 凍結第一列（標題固定）
    ws1['!freeze'] = { xSplit: 0, ySplit: 1 };

    // 套用儲存格樣式（標題、小計、總計）
    const HEADER_STYLE = {
        font: { bold: true, color: { rgb: 'FFFFFF' }, sz: 11 },
        fill: { fgColor: { rgb: '1A1A2E' } },
        alignment: { horizontal: 'center', vertical: 'center' },
        border: { bottom: { style: 'medium', color: { rgb: '007BFF' } } }
    };
    const SUBTOTAL_STYLE = {
        font: { bold: true, color: { rgb: '1D6F42' }, sz: 10 },
        fill: { fgColor: { rgb: 'E8F5E9' } },
        alignment: { horizontal: 'right' },
    };
    const TOTAL_STYLE = {
        font: { bold: true, color: { rgb: 'FFFFFF' }, sz: 12 },
        fill: { fgColor: { rgb: 'D9534F' } },
        alignment: { horizontal: 'center' },
    };
    const NUM_STYLE = {
        numFmt: '#,##0',
    };
    const SUBTOTAL_NUM_STYLE = {
        font: { bold: true, color: { rgb: '1D6F42' } },
        fill: { fgColor: { rgb: 'E8F5E9' } },
        numFmt: '#,##0',
    };
    const TOTAL_NUM_STYLE = {
        font: { bold: true, color: { rgb: 'FFFFFF' }, sz: 12 },
        fill: { fgColor: { rgb: 'D9534F' } },
        numFmt: '#,##0',
    };

    const cols = ['A','B','C','D','E','F'];

    // 標題列樣式
    cols.forEach(c => {
        const cell = ws1[`${c}1`];
        if (cell) cell.s = HEADER_STYLE;
    });

    // 小計列樣式
    subtotalRows.forEach(ri => {
        const r = ri + 1; // 1-based
        cols.forEach((c, ci) => {
            const cell = ws1[`${c}${r}`];
            if (!cell) return;
            cell.s = (ci >= 4) ? SUBTOTAL_NUM_STYLE : SUBTOTAL_STYLE;
        });
    });

    // 總計列樣式
    const tr = totalRowIdx + 1;
    cols.forEach((c, ci) => {
        const cell = ws1[`${c}${tr}`];
        if (!cell) return;
        cell.s = (ci >= 4) ? TOTAL_NUM_STYLE : TOTAL_STYLE;
    });

    // 數字欄加千分位格式
    for (let i = 2; i <= rowIdx; i++) {
        ['E','F'].forEach(c => {
            const cell = ws1[`${c}${i}`];
            if (cell && typeof cell.v === 'number' && !subtotalRows.includes(i-1) && i !== tr) {
                cell.s = NUM_STYLE;
            }
        });
    }

    XLSX.utils.book_append_sheet(wb, ws1, '消費明細');

    // ══════════════════════════════════════════════════════
    // 工作表 2：每日摘要
    // ══════════════════════════════════════════════════════
    const s2Data = [['消費日期', '筆數', '日圓合計 (JPY)', '台幣合計 (TWD)']];
    Object.entries(groups).forEach(([date, items]) => {
        const jpy = items.reduce((s, r) => s + r.amountJPY, 0);
        const twd = items.reduce((s, r) => s + r.amountTWD, 0);
        s2Data.push([date, items.length, jpy, twd]);
    });
    s2Data.push(['✦ 旅行總計', records.length, totalJPY, totalTWD]);

    const ws2 = XLSX.utils.aoa_to_sheet(s2Data);
    ws2['!cols'] = [{ wch: 18 }, { wch: 8 }, { wch: 18 }, { wch: 18 }];
    ws2['!freeze'] = { xSplit: 0, ySplit: 1 };

    // 摘要表標題 & 總計樣式
    ['A','B','C','D'].forEach(c => {
        const cell = ws2[`${c}1`];
        if (cell) cell.s = HEADER_STYLE;
    });
    const s2LastRow = s2Data.length;
    ['A','B','C','D'].forEach((c, ci) => {
        const cell = ws2[`${c}${s2LastRow}`];
        if (!cell) return;
        cell.s = (ci >= 2) ? TOTAL_NUM_STYLE : TOTAL_STYLE;
    });
    // 數字格式
    for (let i = 2; i < s2LastRow; i++) {
        ['C','D'].forEach(c => {
            const cell = ws2[`${c}${i}`];
            if (cell && typeof cell.v === 'number') cell.s = NUM_STYLE;
        });
    }

    XLSX.utils.book_append_sheet(wb, ws2, '每日摘要');

    // 輸出
    const filename = `旅行記帳_${new Date().toISOString().slice(0,10)}.xlsx`;
    XLSX.writeFile(wb, filename);
}

// ── 匯入 JSON ─────────────────────────────────────────────
importInput.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
        try {
            const imported = JSON.parse(ev.target.result);
            if (!Array.isArray(imported)) throw new Error('格式錯誤');
            const existing    = JSON.parse(localStorage.getItem('travel_records')) || [];
            const existingIds = new Set(existing.map(r => r.id));
            const newItems    = imported.filter(r => !existingIds.has(r.id));
            const merged      = [...newItems, ...existing].sort((a, b) => b.id - a.id);
            localStorage.setItem('travel_records', JSON.stringify(merged));
            alert(`✅ 匯入成功！新增 ${newItems.length} 筆，略過重複 ${imported.length - newItems.length} 筆。`);
            renderAll();
        } catch {
            alert('❌ 匯入失敗，請確認為本 App 匯出的 JSON 檔案。');
        }
        importInput.value = '';
    };
    reader.readAsText(file);
});

// ── 清除全部 ──────────────────────────────────────────────
function clearAll() {
    if (!confirm('確定要清除所有紀錄嗎？此動作無法復原。')) return;
    localStorage.removeItem('travel_records');
    renderAll();
}

// ── 初始化 ────────────────────────────────────────────────
initExchangeRate();
renderAll();
